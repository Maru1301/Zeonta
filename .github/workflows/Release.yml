name: Release

on:
  pull_request:
    branches:
      - main
    types: [closed] # 當 PR 被關閉時觸發

jobs:
  release:
    # 只有當 PR 是被合併 (merged) 而不是直接關閉時才執行
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: read # 需要讀取 PR 內容的權限
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 取得版本號
      - name: Get version from wails.json
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content wails.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Detected version: $version"

      # 2. 檢查 Tag 是否已存在
      - name: Check if tag exists
        id: tag_check
        shell: pwsh
        run: |
          git fetch --tags
          $tagExists = git tag -l "v${{ steps.version.outputs.VERSION }}"
          if ($tagExists) {
            echo "SKIP=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "SKIP=false" >> $env:GITHUB_OUTPUT
          }

      # 3. 擷取 PR 的標題與內文作為 Release Notes
      - name: Generate Release Notes from PR
        if: steps.tag_check.outputs.SKIP == 'false'
        id: pr_data
        shell: pwsh
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          $content = "## $env:PR_TITLE`n`n"
          $content += "$env:PR_BODY"
          
          if ([string]::IsNullOrWhiteSpace($env:PR_BODY)) {
            $content = "## $env:PR_TITLE`n`nNo description provided."
          }

          $content | Out-File -FilePath "RELEASE_NOTES.md" -Encoding utf8
          echo "Release notes generated from PR."

      # 4. 環境設定 (Go / Node / Wails)
      - name: Setup Go
        if: steps.tag_check.outputs.SKIP == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Setup Node.js
        if: steps.tag_check.outputs.SKIP == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Wails
        if: steps.tag_check.outputs.SKIP == 'false'
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # 5. 編譯專案
      - name: Build
        if: steps.tag_check.outputs.SKIP == 'false'
        shell: pwsh
        run: wails build -platform windows/amd64

      # 6. 建立 Git Tag 並推送到遠端
      - name: Create tag
        if: steps.tag_check.outputs.SKIP == 'false'
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      # 7. 發布 GitHub Release
      - name: Create Release
        if: steps.tag_check.outputs.SKIP == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "Zeonta v${{ steps.version.outputs.VERSION }}"
          body_path: RELEASE_NOTES.md
          files: |
            build/bin/*.exe
