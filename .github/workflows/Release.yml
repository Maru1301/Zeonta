name: Release

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      skip: ${{ steps.tag_check.outputs.SKIP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from wails.json
        id: version
        run: |
          VERSION=$(cat wails.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: tag_check
        run: |
          git fetch --tags
          if git tag -l "v${{ steps.version.outputs.VERSION }}" | grep -q .; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.VERSION }} already exists, skipping release."
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: zeonta.exe
            artifact_path: build/bin/zeonta.exe
          - os: macos-latest
            platform: darwin/amd64
            artifact_name: zeonta-macos-amd64
            artifact_path: build/bin/zeonta
          - os: macos-14
            platform: darwin/arm64
            artifact_name: zeonta-macos-arm64
            artifact_path: build/bin/zeonta
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact_name: zeonta-linux-amd64
            artifact_path: build/bin/zeonta
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform ${{ matrix.platform }}

      - name: Rename artifact (non-Windows)
        if: matrix.os != 'windows-latest'
        run: mv ${{ matrix.artifact_path }} build/bin/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/${{ matrix.artifact_name }}

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ needs.check-version.outputs.version }}" -m "Release v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          name: "Zeonta v${{ needs.check-version.outputs.version }}"
          body: "${{ github.event.pull_request.title }}\n\n${{ github.event.pull_request.body }}"
          files: dist/**/*
