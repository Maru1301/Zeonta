name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Extract version from wails.json
      - name: Get version from wails.json
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content wails.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Detected version: $version"

      # Skip if this version was already released
      - name: Check if tag exists
        id: tag_check
        shell: pwsh
        run: |
          git fetch --tags
          $tagExists = git tag -l "v${{ steps.version.outputs.VERSION }}"
          if ($tagExists) {
            echo "SKIP=true" >> $env:GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.VERSION }} already exists, skipping release."
          } else {
            echo "SKIP=false" >> $env:GITHUB_OUTPUT
          }

      # Setup Go
      - name: Setup Go
        if: steps.tag_check.outputs.SKIP == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      # Setup Node.js
      - name: Setup Node.js
        if: steps.tag_check.outputs.SKIP == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # Install Wails CLI
      - name: Install Wails
        if: steps.tag_check.outputs.SKIP == 'false'
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Build the Windows app
      - name: Build
        if: steps.tag_check.outputs.SKIP == 'false'
        shell: pwsh
        run: wails build -platform windows/amd64

      # Create git tag
      - name: Create tag
        if: steps.tag_check.outputs.SKIP == 'false'
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      # Create GitHub Release with the .exe attached
      - name: Create Release
        if: steps.tag_check.outputs.SKIP == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "Zeonta v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            build/bin/*.exe
